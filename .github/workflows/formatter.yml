name: Clang Format Checker
on:
  push:
    branches: [ "main", "auto-formatter" ]
  pull-request:
    branches: [ "main" ]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run clang-format
        uses: RafikFarhad/clang-format-github-action@v6
        with:
          sources: "**/*.c,**/*.cpp,**/*.h,**/*.hpp"
          style: file
